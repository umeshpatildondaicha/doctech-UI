<div class="lab-reports-tab">
  <mat-card>
    <mat-card-header>
      <mat-card-title>
        <app-icon fontIcon="science" [size]="24"></app-icon>
        Laboratory Reports
      </mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <table mat-table [dataSource]="labReports" class="lab-reports-table">
        <ng-container matColumnDef="testName">
          <th mat-header-cell *matHeaderCellDef>Test Name</th>
          <td mat-cell *matCellDef="let r">{{ r.testName }}</td>
        </ng-container>
        <ng-container matColumnDef="category">
          <th mat-header-cell *matHeaderCellDef>Category</th>
          <td mat-cell *matCellDef="let r">{{ r.category }}</td>
        </ng-container>
        <ng-container matColumnDef="result">
          <th mat-header-cell *matHeaderCellDef>Result</th>
          <td mat-cell *matCellDef="let r">
            <span [class.abnormal]="r.status === 'abnormal'">{{ r.result }}</span>
          </td>
        </ng-container>
        <ng-container matColumnDef="normalRange">
          <th mat-header-cell *matHeaderCellDef>Normal Range</th>
          <td mat-cell *matCellDef="let r">{{ r.normalRange }}</td>
        </ng-container>
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let r">
            <span class="status-badge" [class]="r.status">{{ r.status }}</span>
          </td>
        </ng-container>
        <ng-container matColumnDef="date">
          <th mat-header-cell *matHeaderCellDef>Date</th>
          <td mat-cell *matCellDef="let r">{{ r.date | date:'mediumDate' }}</td>
        </ng-container>
        <ng-container matColumnDef="orderedBy">
          <th mat-header-cell *matHeaderCellDef>Ordered By</th>
          <td mat-cell *matCellDef="let r">{{ r.orderedBy }}</td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
